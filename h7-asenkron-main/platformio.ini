; PlatformIO Project Configuration File

[env:nucleo_h723zg]
platform = ststm32
board = nucleo_h723zg
framework = arduino
upload_protocol = stlink
monitor_speed = 115200
monitor_eol = CRLF
build_flags =
    -DENABLE_HWSERIAL2
    -DENABLE_HWSERIAL4
    -DENABLE_HWSERIAL5
    -DENABLE_HWSERIAL6
    -DENABLE_HWSERIAL7
    -DENABLE_HWSERIAL8