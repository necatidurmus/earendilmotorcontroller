name: Bug report
description: Firmware behaviour bug (no hardware damage / safety event)
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Firmware branch / commit
      placeholder: "main @ <sha>"
    validations:
      required: true
  - type: input
    id: board
    attributes:
      label: Board
      placeholder: "BlackPill F411CE"
    validations:
      required: true
  - type: input
    id: psu
    attributes:
      label: Power supply voltage / current limit
      placeholder: "12 V / 0.5 A"
    validations:
      required: true
  - type: dropdown
    id: motor_connected
    attributes:
      label: Motor connected or disconnected
      options:
        - Disconnected
        - Connected
    validations:
      required: true
  - type: textarea
    id: sequence
    attributes:
      label: Command sequence
      description: Exact UART commands sent, in order.
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: telemetry
    attributes:
      label: Telemetry log
      description: Paste relevant telemetry lines (RPM:...,T:...,...).
  - type: textarea
    id: safety
    attributes:
      label: Safety notes
      description: Any PSU current-limit trip, unexpected motor motion, heat, smoke?
