[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = arduino
upload_protocol = stlink
monitor_speed = 115200

build_flags =
    -D PC_BAUD=115200
    -D MOTOR_BAUD=115200
    ; USART1 default pins for Nucleo-F446RE:
    ; F446 PA9  TX -> F411 PA3 RX
    ; F446 PA10 RX <- F411 PA2 TX
    -D MOTOR_TX_PIN=PA9
    -D MOTOR_RX_PIN=PA10
    -I include
