; ============================================================
; f411-motor-cube — Modular STM32Cube / PlatformIO build
; ============================================================

[platformio]
default_envs = blackpill_f411ce_stm32cube
src_dir = .

; ------------------------------------------------------------
; STM32Cube F411 firmware
; ------------------------------------------------------------
[env:blackpill_f411ce_stm32cube]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube

; Upload / debug
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

; MCU defines + extra include paths.  All in one build_flags so the
; INI doesn't have duplicate keys.
build_flags =
    -D STM32F411xE
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    -D HSI_VALUE=16000000
    -D HSE_STARTUP_TIMEOUT=100
    -D LSE_STARTUP_TIMEOUT=5000
    -I Core/Inc
    -I App/Inc
    -I App/Src

; HAL modules used (driver selection)
build_unflags =
    -DCORE_HANDLE_MAP_FIX

; Build source list:
;   * CubeMX-generated code under Core/Src
;   * Application code under App/Src
;   (Drivers/ are pulled in by the framework=stm32cube)
build_src_filter =
    +<Core/Src/*>
    +<App/Src/*>
    -<Core/Src/main.c.example>
