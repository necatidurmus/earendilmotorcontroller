; Earendil Motor Controller — STM32F411 Black Pill BLDC firmware
; Framework: STM32Cube HAL (Arduino yok)
; Board: WeAct Studio Black Pill V3 (STM32F411CEU6)
;
; Upload: ST-Link. CLI: UART2 PA2/PA3 @ 115200 (PA9/PA10 TIM1 ile çakışır).
; HSE 25 MHz, SYSCLK 96 MHz, TIM1 timer saati 96 MHz.

[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube

upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

build_flags =
    -D USE_HAL_DRIVER
    -D STM32F411xE

build_src_filter =
    +<*>
    -<.git/>
    -<.svn/>a