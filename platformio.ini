; Earendil Motor Controller — STM32F411 Black Pill BLDC firmware
; Framework: STM32Cube HAL (no Arduino)
; Board: WeAct Studio Black Pill V3 (STM32F411CEU6)
;
; Upload via ST-Link. Serial CLI over UART1 (PA9/PA10 alternate or USB CDC).
; HSE 25 MHz crystal, 100 MHz SYSCLK, 84 MHz APB1 timer clock.

[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube

upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

build_flags =
    -D USE_HAL_DRIVER
    -D STM32F411xE

build_src_filter =
    +<*> -<.git/> -<.svn/>

; Use newlib-nano for smaller binary
build_unflags = -fno-rtti
