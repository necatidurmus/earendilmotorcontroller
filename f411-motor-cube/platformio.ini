; ============================================================
; f411-motor-cube — STM32Cube / PlatformIO build config
; ============================================================
; Original Arduino firmware in f411-motor/ is NOT touched.
; This env builds a separate firmware under framework=stm32cube
; using HAL generated from f411-motor-cube.ioc.
; ============================================================

[platformio]
default_envs = blackpill_f411ce_stm32cube
src_dir = .

; ------------------------------------------------------------
; STM32Cube variant
; ------------------------------------------------------------
[env:blackpill_f411ce_stm32cube]
platform = ststm32
board = blackpill_f411ce
framework = stm32cube

; Upload / debug
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

; MCU defines + extra include paths.  All in one build_flags so the
; INI doesn't have duplicate keys.
build_flags =
    -D STM32F411xE
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    -D HSI_VALUE=16000000
    -D HSE_STARTUP_TIMEOUT=100
    -D LSE_STARTUP_TIMEOUT=5000
    -I Core/Inc
    -I App/Inc
    -I App/Src

; HAL modules used (driver selection)
build_unflags =
    -DCORE_HANDLE_MAP_FIX

; Build source list:
;   * CubeMX-generated code under Core/Src
;   * Application code under App/Src
;   (Drivers/ are pulled in by the framework=stm32cube)
build_src_filter =
    +<Core/Src/*>
    +<App/Src/*>
    -<Core/Src/main.c.example>

; ------------------------------------------------------------
; Legacy Arduino env (placeholder, kept only for documentation)
; Original Arduino firmware lives in ../f411-motor/ — not built here.
; ------------------------------------------------------------
[env:legacy_arduino_placeholder]
platform = ststm32
board = blackpill_f411ce
framework = arduino
build_flags =
    -DBLDC_LEGACY_ARDUINO_PLACEHOLDER
build_src_filter =
    -<*>
